<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menu Glucosa 110</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d6a4f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Glucosa">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f4f0;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:16px 0}
.app{width:100%;max-width:420px;background:#fff;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;min-height:100vh;max-height:100vh;box-shadow:0 4px 24px rgba(0,0,0,0.10)}
@media(max-width:440px){body{padding:0}.app{border-radius:0;min-height:100dvh;max-height:100dvh}}
.topbar{background:linear-gradient(135deg,#2d6a4f,#40916c);padding:14px 20px 12px;color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.topbar-text{flex:1;min-width:0}
.topbar-title{font-size:19px;font-weight:700;letter-spacing:-0.3px}
.topbar-sub{font-size:12px;opacity:0.8;margin-top:3px}
.pdf-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.35);border-radius:20px;padding:7px 13px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background 0.15s;letter-spacing:0.3px}
.pdf-btn:active{background:rgba(255,255,255,0.28)}
.pdf-btn .pdf-icon{font-size:15px}
.day-tabs{display:flex;overflow-x:auto;background:#1b4332;padding:0 8px;gap:2px;scrollbar-width:none;flex-shrink:0}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:9px 13px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.55);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:color 0.15s}
.day-tab.active{color:#fff;border-bottom-color:#74c69d}
.content{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.meal-card{background:#fff;border:1px solid #e8f5e9;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(45,106,79,0.06)}
.meal-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f8fdf9;border-bottom:1px solid #e8f5e9}
.meal-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.mi-d{background:#d8f3dc}.mi-mm{background:#fff3cd}.mi-c{background:#dbeafe}.mi-me{background:#ede9fe}.mi-ce{background:#fce7f3}
.meal-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#40916c}
.meal-body{padding:10px 14px;font-size:13.5px;color:#2d3748;line-height:1.6}
.arr{font-size:10px;color:#aaa;margin:2px 0;text-align:center}
.tip-box{background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:12px;font-size:12.5px;color:#92400e;line-height:1.5}
.section-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:10px}
/* ── Week overview (Mealie calendar) ── */
.week-overview{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;scrollbar-width:none}
.week-overview::-webkit-scrollbar{display:none}
.wo-day{flex:1;min-width:42px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;border-radius:12px;cursor:pointer;border:1.5px solid #e5e7eb;background:#f9fafb;transition:all 0.15s}
.wo-day.active{background:#2d6a4f;border-color:#2d6a4f;color:#fff}
.wo-day-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:inherit}
.wo-day-ic{font-size:17px}
.wo-day:not(.active) .wo-day-name{color:#6b7280}
/* ── Meal card expand ── */
.meal-meta{display:flex;align-items:center;gap:6px;margin-left:auto}
.meal-ig{font-size:10px;font-weight:700;border-radius:8px;padding:2px 7px}
.ig-low{background:#d1fae5;color:#065f46}
.ig-med{background:#fef9c3;color:#854d0e}
.meal-time{font-size:10px;color:#9ca3af;display:flex;align-items:center;gap:2px}
.meal-expand{width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:14px;color:#9ca3af;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.2s}
.meal-expand.open{transform:rotate(180deg)}
.meal-extra{padding:8px 14px 10px;border-top:1px solid #e8f5e9;background:#f0fdf4;font-size:12.5px;color:#166534;line-height:1.5;display:none}
.meal-extra.open{display:block}
.meal-extra strong{color:#1b4332}
/* ── Nota del día ── */
.day-note-wrap{margin-top:4px;margin-bottom:4px}
.day-note-btn{font-size:12px;color:#9ca3af;background:none;border:1px dashed #d1d5db;border-radius:10px;padding:6px 12px;cursor:pointer;width:100%;text-align:left;transition:all 0.15s}
.day-note-btn:hover{border-color:#40916c;color:#40916c}
.day-note-ta{width:100%;border:1.5px solid #40916c;border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;resize:none;color:#374151;outline:none;background:#f0fdf4;margin-top:6px;display:none}
.day-note-ta.open{display:block}
/* ── Shopping interactivo (Mealie-style) ── */
.shop-progress-wrap{margin-bottom:14px}
.shop-progress-label{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:5px}
.shop-progress-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.shop-progress-fill{height:100%;background:linear-gradient(90deg,#2d6a4f,#40916c);border-radius:3px;transition:width 0.3s}
.shop-clear-btn{font-size:11px;color:#40916c;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.shop-cat{margin-bottom:14px}
.shop-cat-name{font-size:13px;font-weight:600;color:#2d6a4f;margin-bottom:6px}
.shop-items{display:flex;flex-direction:column;gap:3px}
.shop-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:10px;background:#f0fdf4;border:1px solid #bbf7d0;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.shop-item.done{background:#f9fafb;border-color:#e5e7eb;opacity:0.6}
.shop-item-check{width:18px;height:18px;border-radius:50%;border:2px solid #40916c;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all 0.15s}
.shop-item.done .shop-item-check{background:#40916c;border-color:#40916c;color:#fff}
.shop-item-name{font-size:12.5px;color:#166534;transition:all 0.15s}
.shop-item.done .shop-item-name{text-decoration:line-through;color:#9ca3af}
.rule-item{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #f3f4f6;font-size:13px;color:#374151}
.rule-item:last-child{border-bottom:none}
.rule-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;font-weight:700}
.rd-yes{background:#d1fae5;color:#065f46}.rd-no{background:#fee2e2;color:#991b1b}
.rules-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:4px 14px}
/* Chat */
.specialist-badge{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#d8f3dc,#b7e4c7);border-radius:14px;padding:12px 14px;margin-bottom:12px}
.badge-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2d6a4f,#40916c);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.badge-name{font-weight:700;color:#1b4332;font-size:14px}
.badge-role{color:#2d6a4f;font-size:12px;margin-top:2px}
.chat-cats{display:flex;overflow-x:auto;gap:6px;margin-bottom:10px;padding-bottom:2px;scrollbar-width:none}
.chat-cats::-webkit-scrollbar{display:none}
.chat-cat-btn{flex-shrink:0;font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:16px;border:1.5px solid #d1fae5;background:#f0fdf4;color:#166534;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.chat-cat-btn.active{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
.quick-questions{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;max-height:110px;overflow-y:auto}
.qq{font-size:11.5px;background:#f0fdf4;border:1px solid #86efac;border-radius:14px;padding:5px 11px;cursor:pointer;color:#166534;font-weight:500;transition:background 0.15s;text-align:left;line-height:1.3}
.qq:active{background:#dcfce7}
.chat-area{display:flex;flex-direction:column;gap:10px;padding-bottom:8px}
.chat-msg-wrap{display:flex;flex-direction:column}
.chat-msg-wrap.user-wrap{align-items:flex-end}
.chat-msg-wrap.bot-wrap{align-items:flex-start}
.chat-bubble{max-width:88%;padding:10px 13px;border-radius:16px;font-size:13.5px;line-height:1.55}
.bubble-user{background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff;border-bottom-right-radius:4px}
.bubble-bot{background:#f3f4f6;color:#111827;border-bottom-left-radius:4px;border:1px solid #e5e7eb;white-space:pre-line}
.bubble-label{font-size:10px;font-weight:600;color:#6b7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}
.bubble-time{font-size:10px;color:#9ca3af;margin-top:3px}
.related-qs{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.related-q{font-size:11.5px;color:#2d6a4f;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:2px 0}
.related-label{font-size:10px;color:#9ca3af;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
.typing-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#9ca3af;margin:0 1px;animation:blink 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.ig-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;border-radius:10px;padding:2px 8px;margin-left:6px;vertical-align:middle}
.ig-low{background:#d1fae5;color:#065f46}
.ig-med{background:#fef9c3;color:#854d0e}
.ig-high{background:#fee2e2;color:#991b1b}
.chat-clear{font-size:11px;color:#9ca3af;cursor:pointer;text-align:right;margin-bottom:6px;text-decoration:underline}
.no-match-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:10px 12px;font-size:12.5px;color:#6b7280}
.no-match-box strong{color:#374151;display:block;margin-bottom:6px}
.chat-input-wrap{display:flex;gap:8px;padding:10px 14px 14px;border-top:1px solid #f3f4f6;background:#fff;flex-shrink:0}
.chat-input-wrap input{flex:1;border:1.5px solid #d1d5db;border-radius:22px;padding:9px 15px;font-size:14px;background:#f9fafb;color:#111;outline:none;-webkit-appearance:none}
.chat-input-wrap input:focus{border-color:#40916c;background:#fff}
.chat-send{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.bottom-nav{display:flex;border-top:1px solid #e5e7eb;background:#fff;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;cursor:pointer;font-size:10px;font-weight:600;color:#9ca3af;border:none;background:none}
.nav-btn.active{color:#2d6a4f}
.nav-btn span{font-size:22px}
/* ── Dark mode ── */
.dark-btn{flex-shrink:0;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:20px;padding:7px 10px;color:#fff;font-size:16px;cursor:pointer;transition:background 0.15s}
.dark-btn:active{background:rgba(255,255,255,0.28)}
[data-dark] body{background:#111827}
[data-dark] .app{background:#1f2937;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
[data-dark] .content{background:#1f2937;color:#f3f4f6}
[data-dark] .meal-card{background:#374151;border-color:#4b5563}
[data-dark] .meal-header{background:#2d3748;border-bottom-color:#4b5563}
[data-dark] .meal-body{color:#e5e7eb}
[data-dark] .meal-extra{background:#1b4332;color:#86efac}
[data-dark] .tip-box{background:#292524;border-left-color:#d97706;color:#fcd34d}
[data-dark] .meal-lbl{color:#86efac}
[data-dark] .meal-time{color:#9ca3af}
[data-dark] .meal-expand{color:#9ca3af}
[data-dark] .bottom-nav{background:#111827;border-top-color:#374151}
[data-dark] .nav-btn{color:#6b7280}
[data-dark] .nav-btn.active{color:#4ade80}
[data-dark] .day-note-btn{border-color:#4b5563;color:#9ca3af}
[data-dark] .day-note-ta{background:#111827;color:#e5e7eb;border-color:#40916c}
[data-dark] .shop-item{background:#374151;border-color:#4b5563}
[data-dark] .shop-item.done{background:#1f2937;border-color:#374151}
[data-dark] .shop-item-name{color:#86efac}
[data-dark] .shop-item.done .shop-item-name{color:#6b7280}
[data-dark] .shop-cat-name{color:#86efac}
[data-dark] .shop-progress-bar{background:#374151}
[data-dark] .rules-card{background:#374151;border-color:#4b5563}
[data-dark] .rule-item{color:#e5e7eb;border-bottom-color:#4b5563}
[data-dark] .section-title{color:#9ca3af}
[data-dark] .bubble-bot{background:#374151;color:#f3f4f6;border-color:#4b5563}
[data-dark] .chat-input-wrap{background:#1f2937;border-top-color:#374151}
[data-dark] .chat-input-wrap input{background:#374151;border-color:#4b5563;color:#f3f4f6}
[data-dark] .chat-cat-btn{background:#374151;border-color:#4b5563;color:#86efac}
[data-dark] .chat-cat-btn.active{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
[data-dark] .qq{background:#374151;border-color:#4b5563;color:#86efac}
[data-dark] .wo-day{background:#374151;border-color:#4b5563}
[data-dark] .wo-day-name{color:#9ca3af}
[data-dark] .no-match-box{background:#374151;border-color:#4b5563;color:#9ca3af}
/* ── Notifications ── */
.notif-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:12px}
.notif-head{font-size:14px;font-weight:700;color:#1b4332;margin-bottom:4px}
.notif-sub{font-size:12px;color:#6b7280;margin-bottom:12px}
.notif-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px;color:#374151}
.notif-row:last-of-type{border-bottom:none}
.notif-row-lbl{flex:1}
.notif-time{border:1px solid #d1d5db;border-radius:8px;padding:4px 8px;font-size:13px;color:#374151;background:#f9fafb}
.notif-enable-btn{width:100%;margin-top:12px;padding:10px;background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.notif-status{margin-top:8px;font-size:12px;text-align:center;padding:6px;border-radius:8px}
.ns-ok{background:#d1fae5;color:#065f46}
.ns-off{background:#fee2e2;color:#991b1b}
.notif-tip{font-size:11.5px;color:#6b7280;margin-top:8px;background:#f9fafb;border-radius:10px;padding:10px;line-height:1.5}
/* ── Preferences ── */
.pref-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:12px}
.pref-head{font-size:14px;font-weight:700;color:#1b4332;margin-bottom:4px}
.pref-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px;color:#374151}
.pref-row:last-of-type{border-bottom:none}
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d1d5db;border-radius:22px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:#2d6a4f}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.pref-warn{font-size:14px;margin-left:4px;vertical-align:middle}
[data-dark] .notif-card,[data-dark] .pref-card{background:#374151;border-color:#4b5563}
[data-dark] .notif-head,[data-dark] .pref-head{color:#86efac}
[data-dark] .notif-sub{color:#9ca3af}
[data-dark] .notif-row,[data-dark] .pref-row{color:#e5e7eb;border-bottom-color:#4b5563}
[data-dark] .notif-time{background:#1f2937;border-color:#4b5563;color:#e5e7eb}
[data-dark] .notif-tip{background:#1f2937;color:#9ca3af}
/* ── Recipe modal ── */
.recipe-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.recipe-modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;padding:20px 16px 32px}
.recipe-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#9ca3af;margin-top:-4px}
.recipe-steps{margin:12px 0;padding:0;list-style:none}
.recipe-step{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13.5px;color:#374151;line-height:1.5}
.recipe-step:last-child{border-bottom:none}
.recipe-step-num{width:24px;height:24px;border-radius:50%;background:#2d6a4f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.recipe-timer{margin-top:14px;background:#f0fdf4;border-radius:14px;padding:14px;text-align:center}
.recipe-timer-display{font-size:40px;font-weight:700;color:#1b4332;letter-spacing:2px;font-variant-numeric:tabular-nums}
.recipe-timer-btns{display:flex;gap:8px;justify-content:center;margin-top:10px}
.recipe-timer-btns button{padding:8px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
.rtb-start{background:#2d6a4f;color:#fff}
.rtb-pause{background:#f59e0b;color:#fff}
.rtb-reset{background:#e5e7eb;color:#374151}
[data-dark] .recipe-modal{background:#1f2937;color:#f3f4f6}
[data-dark] .recipe-step{color:#e5e7eb;border-bottom-color:#374151}
[data-dark] .recipe-timer{background:#111827}
[data-dark] .recipe-timer-display{color:#86efac}
[data-dark] .recipe-close{color:#9ca3af}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-text">
      <div class="topbar-title">Menu Semanal</div>
      <div class="topbar-sub">Glucosa 110 mg/dL — bajo indice glucemico</div>
    </div>
    <button class="dark-btn" id="darkBtn" onclick="toggleDark()" aria-label="Modo oscuro">🌙</button>
    <button class="pdf-btn" onclick="generatePDF()" aria-label="Descargar PDF">
      <span class="pdf-icon">📄</span> PDF
    </button>
  </div>
  <div class="day-tabs" id="dayTabs" style="display:flex"></div>
  <div class="content" id="mainContent"></div>
  <div id="chatInputWrap" style="display:none">
    <div class="chat-input-wrap">
      <input type="text" id="chatInput" placeholder="Escribe tu pregunta..." autocomplete="off">
      <button class="chat-send" onclick="sendQ()" aria-label="Enviar">&#10148;</button>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('dias')" id="nb-dias"><span>📅</span>Dias</button>
    <button class="nav-btn" onclick="switchTab('compra')" id="nb-compra"><span>🛒</span>Compra</button>

   rel:['Como reduzco el IG de mis comidas?','Que fruta puedo comer?']},

function buildDayTabs(){
  document.getElementById('dayTabs').innerHTML=days.map((d,i)=>
    `<div class="day-tab${i===0?' active':''}" onclick="selectDay(${i})">${d.short}</div>`).join('');
}
function selectDay(i){
  currentDay=i;
  document.querySelectorAll('.day-tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  renderDias();
}
function renderDias(){
  const d=days[currentDay];
  const weekOv='<div class="week-overview">'+days.map((day,i)=>'<div class="wo-day'+(i===currentDay?' active':'')+'" onclick="selectDay('+i+')">'+'<span class="wo-day-name">'+day.short+'</span><span class="wo-day-ic">'+day.meals[0].ic+'</span></div>').join('')+'</div>';
  const cards=d.meals.map((m,mi)=>{
    const uid='m'+currentDay+'_'+mi;
    const igCls=m.ig==='low'?'ig-low':'ig-med';
    const igTxt=m.ig==='low'?'🟢 IG Bajo':'🟡 IG Medio';
    return '<div class="meal-card">'
      +'<div class="meal-header">'
        +'<div class="meal-icon mi-'+m.t+'">'+m.ic+'</div>'
        +'<div class="meal-lbl">'+m.lbl+'</div>'
        +'<div class="meal-meta">'
          +'<span class="meal-time">⏱ '+m.time+'</span>'
          +'<span class="meal-ig '+igCls+'">'+igTxt+'</span>'
          +'<button class="meal-expand" id="exp_'+uid+'" onclick="toggleMealExtra(\''+uid+'\')" aria-label="Consejo">▼</button>'
        +'</div>'
      +'</div>'
      +'<div class="meal-body">'+m.items.join('<div class="arr">↓</div>')+'</div>'
      +'<div class="meal-extra" id="extra_'+uid+'"><strong>Consejo:</strong> '+m.tip+'</div>'
    +'</div>';
  }).join('');
  const noteVal=getNoteVal(currentDay);
  const noteLbl=noteVal?'📝 Ver nota del dia':'📝 Anadir nota del dia';
  const noteWrap='<div class="day-note-wrap">'
    +'<button class="day-note-btn" onclick="toggleNote('+currentDay+')">'+noteLbl+'</button>'
    +'<textarea class="day-note-ta'+(noteVal?' open':'')+'" id="noteTA_'+currentDay+'" rows="3" placeholder="Notas del dia: como te has sentido, que has comido de mas..." onblur="saveNote('+currentDay+')">'+noteVal+'</textarea>'
    +'</div>';
  document.getElementById('mainContent').innerHTML=
    '<div class="tip-box"><strong>Regla:</strong> Verdura primero &rarr; Proteina &rarr; Carbohidrato. Camina 15 min despues.</div>'+
    weekOv+cards+noteWrap;
}

    +'<div class="shop-progress-bar"><div class="shop-progress-fill" id="shopFill" style="width:'+pct+'%"></div></div>'
    +'<div class="shop-progress-label" style="margin-top:4px"><span style="color:#40916c;font-weight:600">'+done+' de '+total+' en la cesta</span></div>'

function renderNormas(){

/* ── CHAT ── */
function normalize(s){
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ');
}

function findBestMatch(input){
  const n=normalize(input);
  let best=null,bestScore=0;
  for(const e of kb){
    let score=0;
    for(const kw of e.kw){if(n.includes(normalize(kw)))score+=kw.split(' ').length;}
    if(score>bestScore){bestScore=score;best=e;}
  }
  return bestScore>0?best:null;
}

function getQuickQsByCat(catId){
  return kb.filter(e=>e.cat===catId);
}

function nowTime(){
  return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

function appendMsg(area,html){
  const d=document.createElement('div');
  d.innerHTML=html;
  area.appendChild(d.firstElementChild);
  area.scrollTop=area.scrollHeight;
}

function renderChat(){
  loadHistory();
  const catTabs=cats.map(c=>`<button class="chat-cat-btn${c.id===activeCat?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`).join('');
  const qs=getQuickQsByCat(activeCat);
  const qBtns=qs.map(e=>`<button class="qq" onclick="askEntry(${kb.indexOf(e)})">${e.q}</button>`).join('');

  document.getElementById('mainContent').innerHTML=
    `<div class="specialist-badge"><div class="badge-avatar">🩺</div><div><div class="badge-name">Especialista en Nutricion</div><div class="badge-role">Experto en glucosa y dieta antiinflamatoria</div></div></div>
    <div class="chat-cats" id="chatCats">${catTabs}</div>
    <div class="quick-questions" id="quickQs">${qBtns}</div>
    <div class="chat-clear" onclick="clearChat()">Borrar conversacion</div>
    <div class="chat-area" id="chatArea"></div>`;

  const area=document.getElementById('chatArea');

  if(chatHistory.length===0){
    appendMsg(area,`<div class="chat-msg-wrap bot-wrap">
      <div class="bubble-label">Especialista</div>
      <div class="chat-bubble bubble-bot">Hola! Soy tu especialista en nutricion para controlar la glucosa. Elige una categoria arriba o escribe tu pregunta. 💚</div>
      <div class="bubble-time">${nowTime()}</div>
    </div>`);
  } else {
    chatHistory.forEach(msg=>{
      if(msg.role==='user'){
        appendMsg(area,`<div class="chat-msg-wrap user-wrap">
          <div class="chat-bubble bubble-user">${escHtml(msg.text)}</div>
          <div class="bubble-time">${msg.time}</div>
        </div>`);
      } else {
        appendMsg(area,buildBotBubble(msg.text,msg.related||[],msg.time));
      }
    });
  }

  document.getElementById('chatInput').onkeydown=e=>{if(e.key==='Enter')sendQ();};
}

function setCat(catId){
  activeCat=catId;
  document.querySelectorAll('.chat-cat-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent===cats.find(c=>c.id===catId).label);
  });
  const qs=getQuickQsByCat(catId);
  document.getElementById('quickQs').innerHTML=qs.map(e=>`<button class="qq" onclick="askEntry(${kb.indexOf(e)})">${e.q}</button>`).join('');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildBotBubble(text,related,time){
  const relHtml=related.length>0?`<div class="related-qs"><div class="related-label">Relacionado</div>${related.map(r=>`<div class="related-q" onclick="askText(${JSON.stringify(r)})">${r}</div>`).join('')}</div>`:'';
  return `<div class="chat-msg-wrap bot-wrap">
    <div class="bubble-label">Especialista</div>
    <div class="chat-bubble bubble-bot">${escHtml(text)}</div>
    ${relHtml}
    <div class="bubble-time">${time}</div>
  </div>`;
}

function showTyping(area){
  const id='typing_'+Date.now();
  appendMsg(area,`<div class="chat-msg-wrap bot-wrap" id="${id}">
    <div class="bubble-label">Especialista</div>
    <div class="chat-bubble bubble-bot"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
  </div>`);
  return id;
}

function askEntry(idx){
  const entry=kb[idx];
  if(!entry)return;
  deliverAnswer(entry.q,entry.a,entry.rel||[]);
}

function askText(q){
  deliverAnswer(q,null,null);
}

function deliverAnswer(question,answerText,related){
  const area=document.getElementById('chatArea');
  if(!area)return;

  const t=nowTime();
  appendMsg(area,`<div class="chat-msg-wrap user-wrap">
    <div class="chat-bubble bubble-user">${escHtml(question)}</div>
    <div class="bubble-time">${t}</div>
  </div>`);
  chatHistory.push({role:'user',text:question,time:t});

  const typId=showTyping(area);

  setTimeout(()=>{
    const el=document.getElementById(typId);
    if(!el)return;

    let ans=answerText;
    let rel=related||[];

    if(!ans){
      const match=findBestMatch(question);
      if(match){ans=match.a;rel=match.rel||[];}
      else{
        ans='No tengo una respuesta especifica para eso. Te recomiendo consultar con tu medico o nutricionista para obtener una respuesta personalizada a tu caso.\n\nMientras tanto, recuerda las reglas basicas: verdura primero, proteina luego, carbohidratos en porcion pequena, y camina despues de comer.';
        rel=['Como reduzco el IG de mis comidas?','Cuanto ejercicio necesito?','Puedo revertir la prediabetes?'];
      }
    }

    const bt=nowTime();
    el.outerHTML=buildBotBubble(ans,rel,bt);
    chatHistory.push({role:'bot',text:ans,related:rel,time:bt});
    saveHistory();
    const a=document.getElementById('chatArea');
    if(a)a.scrollTop=a.scrollHeight;
  },700+Math.random()*400);
}

function sendQ(){
  const inp=document.getElementById('chatInput');
  const q=inp.value.trim();
  if(!q)return;
  inp.value='';
  deliverAnswer(q,null,null);
}

function clearChat(){
  chatHistory=[];
  try{localStorage.removeItem('glucosa_chat');}catch(e){}
  renderChat();
}

/* ── SHOP STATE ── */
let shopState={};
function loadShopState(){
  try{const s=localStorage.getItem('glucosa_shop');if(s)shopState=JSON.parse(s);}catch(e){shopState={};}
}
function saveShopState(){
  try{localStorage.setItem('glucosa_shop',JSON.stringify(shopState));}catch(e){}
}
function toggleShopItem(key){
  shopState[key]=!shopState[key];
  saveShopState();
  const el=document.getElementById('si_'+key);
  if(!el)return;
  const checked=shopState[key];
  el.classList.toggle('done',checked);
  el.querySelector('.shop-item-check').textContent=checked?'✓':'';
  updateShopProgress();
}
function updateShopProgress(){
  const total=shopping.reduce((s,c)=>s+c.items.length,0);
  const done=Object.values(shopState).filter(Boolean).length;
  const pct=total?Math.round(done/total*100):0;
  const fill=document.getElementById('shopFill');
  if(fill)fill.style.width=pct+'%';
}
function clearShop(){shopState={};saveShopState();renderCompra();}

/* ── DAY NOTES ── */
function getNoteVal(dayIdx){

}
function toggleNote(dayIdx){
  const ta=document.getElementById('noteTA_'+dayIdx);
  if(!ta)return;
  ta.classList.toggle('open');
  if(ta.classList.contains('open'))ta.focus();
  const btn=ta.previousElementSibling;

function saveNote(dayIdx){
  const ta=document.getElementById('noteTA_'+dayIdx);
  if(!ta)return;
  try{localStorage.setItem('note_'+dayIdx,ta.value);}catch(e){}
  const btn=ta.previousElementSibling;
  if(btn)btn.textContent='📝 '+(ta.value?'Ver nota del dia':'Anadir nota del dia');
}

function switchTab(tab){
  ['dias','compra','normas','chat'].forEach(t=>{document.getElementById('nb-'+t).classList.toggle('active',t===tab)});
  document.getElementById('dayTabs').style.display=tab==='dias'?'flex':'none';
  document.getElementById('chatInputWrap').style.display=tab==='chat'?'block':'none';
  if(tab==='dias')renderDias();
  else if(tab==='compra')renderCompra();
  else if(tab==='normas')renderNormas();
  else renderChat();
}
buildDayTabs();
renderDias();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

/* ── GENERADOR DE PDF ── */
function generatePDF(){
  const btn=document.querySelector('.pdf-btn');
  const orig=btn.innerHTML;
  btn.innerHTML='<span class="pdf-icon">⏳</span> Generando...';
  btn.disabled=true;

  setTimeout(()=>{
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const W=210,M=14;
      let y=0;

      const GREEN=[45,106,79],LIGHT=[232,245,233],DARK=[27,67,50],GRAY=[107,114,128],WHITE=[255,255,255];

      /* ── helpers ── */
      function pageCheck(needed){
        if(y+needed>285){doc.addPage();y=14;}
      }
      function hdr(txt,bg,fg,sz){
        doc.setFillColor(...bg);
        doc.rect(M,y,W-M*2,sz+4,'F');
        doc.setTextColor(...fg);
        doc.setFontSize(sz);
        doc.setFont('helvetica','bold');
        doc.text(txt,M+3,y+sz-1);
        y+=sz+6;
      }
      function label(txt,color,sz){
        doc.setTextColor(...color);
        doc.setFontSize(sz);
        doc.setFont('helvetica','bold');
        doc.text(txt,M,y);
        y+=sz*0.5+1;
      }
      function body(txt,indent,sz,maxW){
        doc.setTextColor(55,65,81);
        doc.setFontSize(sz);
        doc.setFont('helvetica','normal');
        const lines=doc.splitTextToSize(txt,maxW||W-M*2-indent);
        lines.forEach(l=>{
          pageCheck(sz*0.5+1);
          doc.text(l,M+indent,y);
          y+=sz*0.45+1;
        });
        y+=1;
      }
      function sep(){
        doc.setDrawColor(220,220,220);
        doc.line(M,y,W-M,y);
        y+=3;
      }
      function bullet(txt,ok){
        const mark=ok?'✓':'✕';
        const col=ok?[6,95,70]:[153,27,27];
        doc.setFontSize(8.5);
        doc.setFont('helvetica','bold');
        doc.setTextColor(...col);
        doc.text(mark,M+1,y);
        doc.setFont('helvetica','normal');
        doc.setTextColor(55,65,81);
        const lines=doc.splitTextToSize(txt,W-M*2-10);
        lines.forEach((l,i)=>{
          pageCheck(6);
          doc.text(l,M+8,y);
          if(i<lines.length-1)y+=4.5;
        });
        y+=5;
      }

      const mealLabels={d:'Desayuno',mm:'Media manana',c:'Comida',me:'Merienda',ce:'Cena'};

      /* ══ PORTADA ══ */
      doc.setFillColor(...GREEN);
      doc.rect(0,0,210,42,'F');
      doc.setTextColor(...WHITE);
      doc.setFontSize(22);
      doc.setFont('helvetica','bold');
      doc.text('MENU SEMANAL',M,20);
      doc.setFontSize(11);
      doc.setFont('helvetica','normal');
      doc.text('Dieta de bajo indice glucemico — Glucosa 110 mg/dL',M,29);
      const fecha=new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      doc.setFontSize(9);
      doc.setTextColor(180,230,180);
      doc.text('Generado el '+fecha,M,37);
      y=52;

      /* tip */
      doc.setFillColor(255,251,235);
      doc.roundedRect(M,y,W-M*2,11,2,2,'F');
      doc.setFontSize(8.5);
      doc.setFont('helvetica','bold');
      doc.setTextColor(146,64,14);
      doc.text('Regla de oro:',M+3,y+4.5);
      doc.setFont('helvetica','normal');
      doc.text('Verdura primero → Proteina → Carbohidrato. Camina 15 min despues de comer.',M+28,y+4.5);
      doc.setFontSize(8);
      doc.text('Con dieta y ejercicio muchas personas vuelven a valores normales en 3-6 meses.',M+3,y+9);
      y+=16;

      /* ══ DIAS ══ */
      days.forEach((d,di)=>{
        pageCheck(18);
        /* cabecera dia */
        doc.setFillColor(...GREEN);
        doc.rect(M,y,W-M*2,8,'F');
        doc.setFillColor(...LIGHT);
        doc.rect(M+8*2,y,W-M*2-8*2,8,'F');
        doc.setFillColor(...GREEN);
        doc.roundedRect(M,y,20,8,1,1,'F');
        doc.setTextColor(...WHITE);
        doc.setFontSize(9);
        doc.setFont('helvetica','bold');
        doc.text('DIA '+(di+1),M+2,y+5.5);
        doc.setTextColor(...DARK);
        doc.setFontSize(11);
        doc.text(d.name.toUpperCase(),M+22,y+5.5);
        y+=11;

        d.meals.forEach(m=>{
          pageCheck(14);
          doc.setFillColor(248,253,249);
          doc.rect(M,y,W-M*2,5.5,'F');
          doc.setTextColor(...GREEN);
          doc.setFontSize(8);
          doc.setFont('helvetica','bold');
          doc.text(mealLabels[m.t].toUpperCase(),M+2,y+4);
          y+=6.5;
          m.items.forEach(it=>{
            pageCheck(5);
            doc.setFontSize(8.5);
            doc.setFont('helvetica','normal');
            doc.setTextColor(55,65,81);
            doc.text('•',M+3,y);
            const lines=doc.splitTextToSize(it,W-M*2-10);
            lines.forEach((l,i)=>{
              if(i>0)pageCheck(4.5);
              doc.text(l,M+7,y);
              y+=4.5;
            });
          });
          y+=1.5;
        });
        y+=4;
      });

      /* ══ LISTA DE LA COMPRA ══ */
      doc.addPage();y=14;
      hdr('LISTA DE LA COMPRA SEMANAL',GREEN,WHITE,12);

      shopping.forEach(cat=>{
        pageCheck(16);
        doc.setFontSize(9.5);
        doc.setFont('helvetica','bold');
        doc.setTextColor(...DARK);
        doc.text(cat.ic+'  '+cat.name,M,y);
        y+=5;
        /* chips en filas */
        let x=M,rowH=6.5,maxX=W-M;
        cat.items.forEach(it=>{
          const tw=doc.getTextWidth(it)+6;
          if(x+tw>maxX){x=M;y+=rowH;pageCheck(rowH);}
          doc.setFillColor(240,253,244);
          doc.setDrawColor(187,247,208);
          doc.roundedRect(x,y-4,tw,5,1,1,'FD');
          doc.setFontSize(7.5);
          doc.setFont('helvetica','normal');
          doc.setTextColor(22,101,52);
          doc.text(it,x+3,y-0.5);
          x+=tw+3;
        });
        y+=rowH+4;
      });

      /* ══ NORMAS CLAVE ══ */
      pageCheck(20);
      y+=2;
      hdr('NORMAS CLAVE',DARK,WHITE,12);

      const yes=rules.filter(r=>r.yes);
      const no=rules.filter(r=>!r.yes);

      doc.setFontSize(9);
      doc.setFont('helvetica','bold');
      doc.setTextColor(...GREEN);
      doc.text('RECOMENDADO',M,y);
      y+=5;
      yes.forEach(r=>{pageCheck(7);bullet(r.text,true);});

      y+=3;
      doc.setFontSize(9);
      doc.setFont('helvetica','bold');
      doc.setTextColor(153,27,27);
      doc.text('EVITAR',M,y);
      y+=5;
      no.forEach(r=>{pageCheck(7);bullet(r.text,false);});

      /* ══ PIE ══ */
      const total=doc.getNumberOfPages();
      for(let i=1;i<=total;i++){
        doc.setPage(i);
        doc.setFontSize(7.5);
        doc.setTextColor(180,180,180);
        doc.text('Menu Semanal — Glucosa 110 mg/dL',M,293);
        doc.text('Pagina '+i+' de '+total,W-M,293,{align:'right'});
        doc.setDrawColor(220,220,220);
        doc.line(M,290,W-M,290);
      }

      doc.save('menu-glucosa-semanal.pdf');
    }catch(e){
      alert('Error al generar el PDF. Asegurate de tener conexion a internet para cargar la libreria.');
      console.error(e);
    }finally{
      btn.innerHTML=orig;
      btn.disabled=false;
    }
  },50);
}
</script>
